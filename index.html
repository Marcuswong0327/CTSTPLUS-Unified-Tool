<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Talent Search Tool Plus 2.2</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="landing-page">
        <h2>Talent Search Tool Plus 2.3</h2>

        <button class="tool-button" data-tool="auto-messenger">
            <h3>SEEK Auto-Messenger</h3>
            <p>Automate messaging candidates in SEEK Talent Search pools</p>
        </button>

        <button class="tool-button" data-tool="profile-downloader">
            <h3>Profile Downloader</h3>
            <p>Download Resumes from SEEK</p>
        </button>

        <button class="tool-button" id="resume-parser-2-button">
            <h3>Resume Parser 2.0</h3>
            <p>Advanced resume extraction (AI)</p>
        </button>

        <button class="tool-button" data-tool="competitor-research-tool">
            <h3>Competitor Research Tool</h3>
            <p>Research competitors' talent pool</p>
        </button>

        <button class="tool-button" data-tool="talent-pool-enrichment">
            <h3>Talent Pool Enrichment</h3>
            <p>Extract candidates' contacts from Linkedln URLs</p>
        </button>

        <button class="tool-button" data-tool="talent-pool-extraction">
            <h3>Talent Pool Extraction</h3>
            <p>Extract candidates' info from SEEK Talent Pool</p>
        </button>
    </div>

    <script src="navigation.js"></script>
</body>

</html>
